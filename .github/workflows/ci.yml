name: React CI

on:
  push:
  pull_request:
    branches:
      - main
      - development

jobs:
  build-test-react:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v3

      - name: Install npm dependencies
        run: npm install

      - name: Lint code
        run: npm run lint

      - name: Check formatting
        run: npx prettier --check .

      - name: Build project
        run: npm run build
